<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
      * {
        margin: 0px;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body, html {
        height: 100%;
        width: 100%;
        overflow: hidden; /* ป้องกันการเลื่อนจอ */
      }
      
      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
      }

      .cover {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* ฝั่งฟอร์ม Login */
      .card-login{
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        background-color: #fff;
      }

      .middle {
        display: flex;
        flex-direction: column;
        gap: 48px; 
        width: 100%;
        max-width: 550px;
      }

      .login b {
        font-size: 64px;
        display: block;
        margin-bottom: 30px;
        color: #1a1a1a;
      }

      .login {
        text-align: center;
        border: 1px solid rgb(0, 0, 0);
        border-radius: 24px;
        padding: 64px;
        box-shadow: 4px 4px 10px rgba(0, 0, 0, 1);
        background-color: #f9f9f9;
      }

      .input-field {
        font-size: 18px;
        text-align: left;
        color: rgb(70, 70, 70);
        margin-bottom: 48px;
      }

      .input-field p {
        margin-bottom: 8px;
        font-weight: 600;
      }

      input {
        font-size: 18px;
        width: 100%;
        height: 54px;
        padding-left: 24px;
        margin-top: 11px;
        border: 1px solid rgb(143, 143, 140);
        border-radius: 12px;
        background-color: #f9f9f9;
        outline: none;
        transition: all 0.2s;
      }

      input:focus {
        border-color: #3b80ff;
        background-color: #fff;
      }

      button[type=submit]{
        color: #ffffff;
        font-size: 20px;
        background-color: rgb(59, 128, 255);
        width: 100%;
        height: 58px;
        border: none;
        border-radius: 40px;
        cursor: pointer;
      }

      .dont-have-account {
        font-size: 18px;
        text-align: center;
        padding: 16px;
        border: 1px solid rgb(0, 0, 0);
        border-radius: 24px;
        box-shadow: 4px 4px 10px rgba(0, 0, 0, 1);
      }

      .sign-in {
        text-decoration: underline;
      }

      a:link{
        color: black;
      }

      a:visited {
        color: black;
      }

      a:hover {
        color: red;
      }

      @media (max-width: 1024px ) {
        /* body, html {
          position: fixed;
        } */

        .container {
          grid-template-columns: 1fr;
        }

        .cover {
          position: absolute;
          top: 0;
          left: 0;
          z-index: -1;
        }

        .cover img {
          filter: brightness(0.6);
        }

        /* ปรับฟอร์มให้อยู่กึ่งกลางหน้าจอที่มีพื้นหลังเป็นรูป */
        .card-login {
          background-color: transparent;
          padding: 120px;
        }
        
        .middle {
          max-width: 100%;
          gap: 20px;
        }

        .login b {
          font-size: 56px;
          margin-bottom: 32px;
        }
      
        .dont-have-account {
          background-color: rgba(255, 255, 255, 0.98);
          border-radius: 20px;
          padding: 20px;
        }
      }
      
      @media (max-width: 480px) {
        body, html {
          position: fixed; /* ล็อกจอสำหรับมือถือ */
        }

        .container {
          grid-template-columns: 1fr;
        }

        .cover {
          position: absolute;
          top: 0;
          left: 0;
          z-index: -1;
        }

        .cover img {
          filter: brightness(0.6);
        }

        /* ปรับฟอร์มให้อยู่กึ่งกลางหน้าจอที่มีพื้นหลังเป็นรูป */
        .card-login {
          background-color: transparent;
          padding: 20px;
        }
        
        .middle {
          max-width: 100%;
          gap: 20px;
        }

        .login b {
          font-size: 48px;
          margin-bottom: 20px;
        }
      
        .dont-have-account {
          background-color: rgba(255, 255, 255, 0.98);
          border-radius: 20px;
          padding: 15px;
        }
          
      }
      </style>
  </head>
<body>
    <div class="container">
        <div class="cover">
            <img src="cover.png"  alt="cover" >
        </div>

        <div class="card-login">
          <div class="middle">
            <div class="login">
              <p><b>LOGIN</b></p>
              <div class="input-field">
                <p>Username</p>
                <div class="input">
                  <input type="text" id="username"  placeholder="Username">
                </div>
              </div>
              <div class="input-field">
                <p>Password</p>
                <input type="password" id="password" placeholder="Password">
              </div>
              <button type="submit" class="login-button">Login</button>
            </div>

            <div class="dont-have-account">
              <p>Don't have an account? <a class="sign-in" href="register.html" target="_blank">Sign up</a></p>
            </div>
          </div>
        </div>
    </div>
</body>

</html>
